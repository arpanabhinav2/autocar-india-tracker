<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>AutoCar India Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              automotive: {
                900: '#0a0a0f',
                800: '#14141e',
                700: '#1e1e2d',
                accent: '#ff3333',
                light: '#f8fafc'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'slide-up': 'slideUp 0.8s ease-out forwards',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          background-color: #000;
          color: #f3f4f6;
          background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #000000 70%);
          background-attachment: fixed;
          overflow-x: hidden;
        }
      }

      @layer components {
        .btn-primary {
          @apply relative flex items-center justify-center px-6 py-3 font-bold rounded-xl text-white shadow-[0_0_20px_rgba(239,68,68,0.3)] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed overflow-hidden;
          background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
        }
        
        .btn-primary:not(:disabled):hover {
          @apply shadow-[0_0_30px_rgba(239,68,68,0.6)] scale-105;
        }

        .glass-panel {
          @apply bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl;
        }
        
        .glass-card {
          @apply bg-gradient-to-b from-white/10 to-white/5 backdrop-blur-md border border-white/10 shadow-2xl rounded-3xl overflow-hidden relative transition-all duration-500 hover:border-white/20 hover:shadow-[0_0_40px_rgba(239,68,68,0.15)];
        }
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        margin: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(239, 68, 68, 0.5);
      }
    </style>
  </body>
</html>
